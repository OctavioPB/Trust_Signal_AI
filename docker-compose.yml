# ────────────────────────────────────────────────────────────────────────────
# TrustSignal AI — Local Development Stack
#
# Services:  Zookeeper · Kafka broker · Kafka topic init
#            MinIO (S3-compatible) · MinIO bucket init
#            PostgreSQL (Airflow metadata) · Airflow init/webserver/scheduler
#            Spark master (Delta Lake)
#
# Usage:     docker compose up -d
#            bash scripts/smoke_test.sh
# ────────────────────────────────────────────────────────────────────────────

networks:
  trustsignal:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  delta-data:

# ── Airflow common config (YAML anchor) ─────────────────────────────────────
x-airflow-common:
  &airflow-common
  image: apache/airflow:2.8.1-python3.11
  networks:
    - trustsignal
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg="
    AIRFLOW__WEBSERVER__SECRET_KEY: "trustsignal-dev-secret-change-in-prod"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    # Propagate stack addresses to DAGs
    KAFKA_BOOTSTRAP_SERVERS: "broker:29092"
    MINIO_ENDPOINT: "http://minio:9000"
    MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
    MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
    DELTA_LAKE_PATH: "/delta"
  volumes:
    - ./airflow/dags:/opt/airflow/dags:ro

services:

  # ── Kafka Stack ─────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    hostname: zookeeper
    container_name: ts-zookeeper
    networks:
      - trustsignal
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      # srvr is whitelisted by default in CP 7.x; ruok is not.
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  broker:
    image: confluentinc/cp-kafka:7.6.1
    hostname: broker
    container_name: ts-broker
    networks:
      - trustsignal
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9095:9092"   # 9092 taken by harmoni-kafka; use 9095 on host
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9095
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9095"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Creates topics with correct retention on first boot
  kafka-setup:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ts-kafka-setup
    networks:
      - trustsignal
    depends_on:
      broker:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server broker:29092 \
          --create --if-not-exists \
          --topic interview-audio-stream \
          --partitions 3 --replication-factor 1 \
          --config retention.ms=86400000 &&
        kafka-topics --bootstrap-server broker:29092 \
          --create --if-not-exists \
          --topic interview-text-stream \
          --partitions 3 --replication-factor 1 \
          --config retention.ms=604800000 &&
        echo "==> Kafka topics ready:" &&
        kafka-topics --bootstrap-server broker:29092 --describe
        # 3 partitions allow 3 parallel consumer instances (one per partition).
        # Run 3 consumer workers: docker compose run audio-consumer  ×3
        # or: docker compose up --scale audio-consumer=3 (with Swarm / Compose v2)

  # ── Object Storage ──────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ts-minio
    networks:
      - trustsignal
    ports:
      - "9200:9000"   # 9000 taken by harmoni-clickhouse, 9100/9101 taken by harmoni-kafka
      - "9201:9001"   # MinIO console on 9201
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY:-minioadmin}"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the three required buckets on first boot
  minio-setup:
    image: minio/mc:latest
    container_name: ts-minio-setup
    networks:
      - trustsignal
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin} &&
        mc mb --ignore-existing local/raw-audio &&
        mc mb --ignore-existing local/model-artifacts &&
        mc mb --ignore-existing local/delta-tables &&
        echo "==> MinIO buckets ready."

  # ── Airflow Metadata DB ─────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ts-postgres
    networks:
      - trustsignal
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Airflow Services ────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: ts-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@trustsignal.ai \
          --password admin &&
        echo "==> Airflow initialised."

  airflow-webserver:
    <<: *airflow-common
    container_name: ts-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8083:8080"   # 8080 taken by harmoni-kafka-ui, 8082 by harmoni-airflow-webserver
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-scheduler:
    <<: *airflow-common
    container_name: ts-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler

  # ── Spark + Delta Lake ──────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.3
    container_name: ts-spark-master
    hostname: spark-master
    networks:
      - trustsignal
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "7077:7077"
      - "8090:8080"  # Spark UI (8080 used by Airflow)
    volumes:
      - delta-data:/delta
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
